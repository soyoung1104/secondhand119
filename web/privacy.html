<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인정보 처리방침 - 헌옷119</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .policy { max-width: 560px; margin: 0 auto; padding: 32px 24px; text-align: left; line-height: 1.6; }
    .policy h2 { margin-top: 28px; }
  </style>
</head>
<body>
  <main class="policy">
    <h1>개인정보 수집·이용 동의</h1>

    <h2>1. 수집 항목</h2>
    <p>이름, 은행명, 계좌번호, 주소(상세주소 포함), 공동현관 비밀번호, 전화번호</p>

    <h2>2. 수집 목적</h2>
    <p>헌옷(의류/가방/신발) 방문 수거 접수, 접수자 연락, 공동현관 출입, 매입대금 지급</p>

    <h2>3. 보유 및 이용 기간</h2>
    <p>수거 완료 후 6개월간 보관하며, 이후 지체 없이 파기합니다.</p>

    <h2>4. 동의 거부 권리 및 불이익</h2>
    <p>이용자는 개인정보 수집·이용에 동의하지 않을 권리가 있으며, 다만 동의하지 않을 경우
      방문 수거 접수가 불가합니다.</p>
  </main>
</body>
</html>
